<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="QuickUnitSwap">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="100" height="50" rx="22" fill="url(#shine)"/>

  <!-- Top arrow — pointing right -->
  <line x1="16" y1="36" x2="70" y2="36" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <polyline points="54,20 72,36 54,52"
    stroke="white" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>

  <!-- Bottom arrow — pointing left -->
  <line x1="84" y1="64" x2="30" y2="64" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <polyline points="46,48 28,64 46,80"
    stroke="white" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>
</svg>
